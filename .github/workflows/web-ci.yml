name: web-ci

on:
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"

permissions:
  contents: read

jobs:
  web:
    name: web (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (trust boundary)
        run: npm test
      - name: Build
        run: npm run build

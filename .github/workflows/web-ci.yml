name: web-ci

on:
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/web-ci.yml"

permissions:
  contents: read

jobs:
  web:
    name: web (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sk
          POSTGRES_PASSWORD: sk
          POSTGRES_DB: streamkill_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://sk:sk@127.0.0.1:5432/streamkill_test
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (trust boundary)
        run: npm test
      - name: Build
        run: npm run build
      - name: Smoke test the production build
        env:
          AUTH_SECRET: ci-smoke-secret
          CONTRACT_SIGNING_SECRET: ci-smoke-secret
          AUTH_GOOGLE_ID: ci-client
          AUTH_GOOGLE_SECRET: ci-client-secret
          PORT: "3100"
        run: |
          npm run start &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl -sf -o /dev/null http://localhost:3100/ && break
            sleep 1
          done
          BASE_URL=http://localhost:3100 SMOKE_SECRET=ci-smoke-secret npm run smoke
          kill $SERVER_PID

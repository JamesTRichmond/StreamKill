name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repo-sanity:
    name: repo-sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure core files exist
        run: |
          test -f README.md
          test -f .gitignore
          test -f .editorconfig
          test -f LICENSE

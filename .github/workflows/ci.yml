name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repo-sanity:
    name: repo-sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure core files exist
        run: |
          test -f README.md
          test -f .gitignore
          test -f .editorconfig
          test -f LICENSE

  node-ci:
    name: Node checks (if package.json exists)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for package.json
        id: pkg
        run: echo "exists=$(test -f package.json && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
      - name: Detect package manager
        id: pm
        if: steps.pkg.outputs.exists == 'true'
        run: |
          if [ -f yarn.lock ]; then
            echo "cache=yarn" >> $GITHUB_OUTPUT
          elif [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            echo "cache=npm" >> $GITHUB_OUTPUT
          fi
      - uses: actions/setup-node@v4
        if: steps.pkg.outputs.exists == 'true' && steps.pm.outputs.cache != ''
        with:
          node-version: "20"
          cache: ${{ steps.pm.outputs.cache }}
      - uses: actions/setup-node@v4
        if: steps.pkg.outputs.exists == 'true' && steps.pm.outputs.cache == ''
        with:
          node-version: "20"
      - run: npm ci
        if: steps.pkg.outputs.exists == 'true' && steps.pm.outputs.cache != ''
      - run: npm run lint --if-present
        if: steps.pkg.outputs.exists == 'true' && steps.pm.outputs.cache != ''
      - run: npm test --if-present
        if: steps.pkg.outputs.exists == 'true' && steps.pm.outputs.cache != ''

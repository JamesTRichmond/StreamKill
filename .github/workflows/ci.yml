name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  repo-sanity:
    name: repo-sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure core files exist
        run: |
          test -f README.md
          test -f .gitignore
          test -f .editorconfig
          test -f LICENSE

  node-ci:
    name: Node checks (if package.json exists)
    if: ${{ hashFiles('**/package.json') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
      - run: npm run lint --if-present
      - run: npm test --if-present

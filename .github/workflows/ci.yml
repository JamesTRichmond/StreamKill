name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repo-sanity:
    name: Repository sanity checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure core files exist
        run: |
          test -f README.md
          test -f .gitignore
          test -f .editorconfig
          test -f LICENSE

  node-ci:
    name: Node checks (if package.json exists)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present
